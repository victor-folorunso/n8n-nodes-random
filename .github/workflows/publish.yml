# Publishes the package to npm on every version tag push (e.g. v0.1.0)
# Uses an NPM_TOKEN secret — no Trusted Publishers / OIDC needed.
#
# Setup (one-time):
# 1. Go to npmjs.com -> Access Tokens -> Generate New Token (Automation)
# 2. Add the token as a repository secret named NPM_TOKEN:
#    GitHub repo -> Settings -> Secrets and variables -> Actions -> New secret
#
# To release a new version:
# 1. Update version in package.json
# 2. git add . && git commit -m "release: v0.x.x"
# 3. git tag v0.x.x
# 4. git push && git push --tags
# GitHub Actions will build, verify, and publish automatically.

name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify npm auth
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
